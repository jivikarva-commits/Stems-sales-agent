# Render Blueprint — multi-service deployment for Stems Sales Agent
#
# Services:
#   1. stems-sales-agent-backend  — Python FastAPI (auth, dashboard, proxies to Node)
#   2. stems-sales-agent-wa       — Node Baileys WhatsApp agent
#
# Auth state for WhatsApp/Baileys is now stored in MongoDB
# (database: stems-wa-auth, collection: wa_auth) so no persistent disk is needed.
# This means both services can run on Render's FREE tier.
#
# After first deploy, set these in the Render dashboard for BOTH services:
#   MONGODB_URI, MONGO_URL, CLAUDE_API_KEY, PRIMARY_OWNER_EMAIL, GOOGLE_CLIENT_ID
#
# Frontend (Vercel) must have:
#   REACT_APP_BACKEND_URL = https://stems-sales-agent-backend.onrender.com

services:
  # ── Python FastAPI backend ───────────────────────────────────────────────
  - type: web
    name: stems-sales-agent-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_NAME
        value: stems-agents-data
      - key: CORS_ORIGINS
        value: "*"
      # Public URL of the WhatsApp Node service — Render injects the full https URL
      - key: WHATSAPP_AGENT_URL
        fromService:
          type: web
          name: stems-sales-agent-wa
          envVarKey: RENDER_EXTERNAL_URL
      # Email + Call agents not deployed — point to localhost so backend
      # marks them "unavailable" without crashing.
      - key: EMAIL_AGENT_URL
        value: http://localhost:3001
      - key: CALL_AGENT_URL
        value: http://localhost:3002
      # Secrets — set manually in Render dashboard during initial setup
      - key: MONGO_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: PRIMARY_OWNER_EMAIL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VAPI_PRIVATE_KEY
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false
      - key: VAPI_ASSISTANT_ID
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_FROM_NAME
        sync: false
      - key: YCLOUD_API_KEY
        sync: false
      - key: YCLOUD_WHATSAPP_NUMBER
        sync: false
      - key: YCLOUD_WABA_ID
        sync: false

  # ── Node Baileys WhatsApp agent (Mongo-backed auth, no disk needed) ──────
  - type: web
    name: stems-sales-agent-wa
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node agents/whatsapp-agent.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      # Render auto-injects PORT — Node code reads process.env.PORT
      - key: MONGODB_URI
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: PRIMARY_OWNER_EMAIL
        sync: false
      # Auth state — separate database in the same MongoDB cluster
      - key: WA_AUTH_DB_NAME
        value: stems-wa-auth
      - key: WA_AUTH_COLLECTION
        value: wa_auth
      # Force Mongo backend (set to "file" to use disk-based sessions instead)
      - key: WA_AUTH_BACKEND
        value: mongo